<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <!-- Jotscope lockup: mark + wordmark. Wordmark uses currentColor so it
       flips between light and dark README backgrounds. -->
  <g transform="translate(8,8) scale(0.86)">
    <line x1="82" y1="82" x2="105" y2="105" stroke="#6366f1" stroke-width="11" stroke-linecap="round"/>
    <circle cx="55" cy="55" r="38" stroke="#6366f1" stroke-width="9"/>
    <rect x="38" y="44" width="30" height="7" rx="3.5" fill="#6366f1"/>
    <rect x="38" y="55.5" width="40" height="7" rx="3.5" fill="#047857"/>
    <rect x="38" y="67" width="24" height="7" rx="3.5" fill="#c026d3"/>
  </g>
  <text x="128" y="78" font-family="system-ui, -apple-system, 'Segoe UI', Inter, Arial, sans-serif" font-size="56" font-weight="600" letter-spacing="-1.5" fill="currentColor">Jotscope</text>
</svg>
