<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <!-- Jotscope lockup: mark + wordmark. Wordmark uses currentColor so it
       flips between light and dark README backgrounds. -->
  <g transform="translate(8,5) scale(0.86)">
    <line x1="83" y1="83" x2="106" y2="106" stroke="#6366f1" stroke-width="13" stroke-linecap="round"/>
    <circle cx="52" cy="52" r="40" stroke="#6366f1" stroke-width="8"/>
    <rect x="33" y="41" width="38" height="6.5" rx="3.25" fill="#6366f1"/>
    <rect x="33" y="52.5" width="30" height="6.5" rx="3.25" fill="#047857"/>
    <rect x="33" y="64" width="21" height="6.5" rx="3.25" fill="#c026d3"/>
  </g>
  <text x="128" y="78" font-family="system-ui, -apple-system, 'Segoe UI', Inter, Arial, sans-serif" font-size="56" font-weight="600" letter-spacing="-1.5" fill="currentColor">Jotscope</text>
</svg>
