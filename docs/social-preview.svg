<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <!-- GitHub social preview (1280x640, the OG card shown when the repo is
       shared). Rendered to docs/media/social-preview.png by gen-screenshots.js.
       Upload via Settings > General > Social preview. Dark-theme brand palette. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="60%" stop-color="#111a30"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Lockup: colored magnifier mark + wordmark -->
  <g transform="translate(372,120)">
    <g transform="scale(1.4)">
      <line x1="82" y1="82" x2="105" y2="105" stroke="#818cf8" stroke-width="11" stroke-linecap="round"/>
      <circle cx="55" cy="55" r="38" stroke="#818cf8" stroke-width="9"/>
      <rect x="38" y="44" width="30" height="7" rx="3.5" fill="#818cf8"/>
      <rect x="38" y="55.5" width="40" height="7" rx="3.5" fill="#34d399"/>
      <rect x="38" y="67" width="24" height="7" rx="3.5" fill="#e879f9"/>
    </g>
    <text x="212" y="128" font-family="system-ui, 'Segoe UI', Arial, sans-serif" font-size="112" font-weight="700" letter-spacing="-3" fill="#f8fafc">Jotscope</text>
  </g>

  <!-- Tagline -->
  <text x="640" y="392" text-anchor="middle" font-family="system-ui, 'Segoe UI', Arial, sans-serif" font-size="42" font-weight="500" fill="#cbd5e1">Decode, inspect &amp; verify JSON Web Tokens</text>
  <text x="640" y="446" text-anchor="middle" font-family="system-ui, 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="500" letter-spacing="2" fill="#64748b">100% OFFLINE · NO TELEMETRY · ZERO DEPENDENCIES</text>

  <!-- JWT segment motif: header . payload . signature -->
  <text x="640" y="556" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Consolas, monospace" font-size="30" letter-spacing="1">
    <tspan fill="#818cf8">eyJhbGciOiJIUzI1NiJ9</tspan><tspan fill="#475569">.</tspan><tspan fill="#34d399">eyJzdWIiOiJqb3RzY29wZSJ9</tspan><tspan fill="#475569">.</tspan><tspan fill="#e879f9">SflKxwRJSMeKKF2QT4</tspan>
  </text>
</svg>
