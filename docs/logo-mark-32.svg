  <rect x="8.8" y="10" width="9" height="2.2" rx="1.1" fill="#fff"/>
  <rect x="8.8" y="13.4" width="11.5" height="2.2" rx="1.1" fill="#fff"/>
  <rect x="8.8" y="16.8" width="7" height="2.2" rx="1.1" fill="#fff"/>
</svg>
