name: release-please

# MANUAL releases. Merging feature/fix PRs does NOT open a release PR - you
# release when you decide:
#   1. Actions -> release-please -> "Run workflow" (workflow_dispatch). This
#      opens/updates the "chore(main): release X.Y.Z" PR from everything merged
#      since the last release (bumps package.json + manifest.json, writes CHANGELOG).
#   2. Review and merge that PR. Merging it re-runs this workflow (the push is a
#      release commit, matched below), which tags the release, publishes the
#      GitHub Release, attaches the zip, and uploads a Web Store draft.
# The push trigger exists only to cut the release when the release PR is merged;
# ordinary merges are ignored by the job-level `if`.
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Run only when you trigger it manually, or when a release PR is being merged.
    # Ordinary feature/fix merges fall through and do nothing - no release PR.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore(main): release'))
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
      # Chrome Web Store API credentials - add these four as repo secrets to
      # enable the draft upload (see RELEASING.md). Until then the store step is
      # skipped and the release still gets the built zip attached.
      EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
      CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
      REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build the Web Store package
        run: npm run build:zip
      - name: Attach the zip to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp dist/jotscope.zip "jotscope-${TAG}.zip"
          gh release upload "$TAG" "jotscope-${TAG}.zip" --clobber
      - name: Upload the new version to the Chrome Web Store (draft)
        if: env.CLIENT_ID != ''
        run: npx --yes chrome-webstore-upload-cli@3 upload --source dist/jotscope.zip
