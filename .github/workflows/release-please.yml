name: release-please

# Watches main and maintains a "release PR" that bumps the version
# (package.json + manifest.json) and updates CHANGELOG.md from Conventional
# Commit messages. Merging that PR tags the release and publishes a GitHub
# Release. Config lives in release-please-config.json + .release-please-manifest.json.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
