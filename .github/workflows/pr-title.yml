name: PR title

# With squash-only merges, GitHub uses the PR title as the commit message on
# main - which is exactly what release-please reads to decide the version bump
# and changelog. So the PR title must be a Conventional Commit (feat:, fix:, …).
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
